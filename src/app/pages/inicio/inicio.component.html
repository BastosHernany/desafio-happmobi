<section class="bg-[#FDFDFD] min-h-screen pb-35">
    <header class="w-full relative">
        <img src="assets/banner-inicio.png" alt="Banner" class="w-full h-72 object-cover" />
        <div class="absolute inset-0 bg-slate-900/55"></div>

        <div class="absolute left-1/2 top-35 transform -translate-x-1/2 -translate-y-1/2 flex flex-col items-center z-10">
            <div class="rounded-full shadow-md">
                <div class="overflow-hidden rounded-full w-26 h-26 md:w-28 md:h-28">
                    <img [src]="fotoUsuario" [alt]="nomeUsuario" class="w-full h-full object-cover object-center block" />
                </div>
            </div>
            <h2 class="mt-2.5 text-2xl md:text-2xl font-regular text-white text-center drop-shadow-md">Olá, {{ nomeUsuario }}</h2>
        </div>
    </header>


    <main class="px-4 pt-0">
        <div class="-mt-6 relative z-10 flex gap-4 items-center justify-center">
            <button class="flex-1 bg-white shadow rounded-xl py-3 px-4 flex items-center gap-3">
                <img src="assets/icones/lupa.svg" alt="Buscar" class="w-5 h-5" />
                <span class="text-slate-600">Buscar carro</span>
            </button>

            <button routerLink="/filtro" class="w-24 bg-white shadow rounded-xl py-3 flex items-center justify-center cursor-pointer">
                <img src="assets/icones/filtro.svg" alt="Filtrar" class="w-5 h-5" />
                <span class="text-slate-600">Filtrar</span> 
            </button>
        </div>


        <section class="mt-8">
            <h3 class="text-lg font-semibold text-slate-800 mb-4">Últimas reservas</h3>

            <div class="flex gap-4 overflow-x-auto pb-4 no-scrollbar touch-pan-x cursor-grab" appDragScroll>
                <ng-container *ngIf="carros$ | async as carros">
                    <app-card-carro *ngFor="let c of carros.slice(0,2)" [carro]="c" [contexto]="'inicio'"></app-card-carro>
                </ng-container>
            </div>
        </section>


        <div class="mt-8 flex justify-center">
            <button class="bg-slate-800 text-white rounded-full px-8 py-4 shadow-lg flex items-center gap-3">
                <img src="assets/icones/qr-code.svg" alt="QR" class="w-6 h-6" />
                <span>Acessar por QR code</span>
            </button>
        </div>

        <div class="mt-4 flex justify-center">
            <button (click)="abrirModalAdicionar()" class="bg-rose-600 text-white rounded-full px-6 py-3 shadow-lg flex items-center gap-3 cursor-pointer">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
                </svg>
                <span class="font-medium">Adicionar veículo</span>
            </button>
        </div>


        <div *ngIf="mostrandoModalAdicionar" class="fixed inset-0 z-50 flex items-center justify-center bg-black/50">
            <div class="w-full max-w-lg bg-white rounded-lg shadow-lg p-6">
                <h3 class="text-lg font-semibold mb-4">Adicionar veículo</h3>
                <div class="grid grid-cols-1 gap-3">
                    <label class="text-sm">Nome
                        <input [(ngModel)]="novoVeiculo.name" class="w-full mt-1 border rounded px-3 py-2" />
                    </label>

                    <label class="text-sm">Ano do modelo
                        <input [(ngModel)]="novoVeiculo.year" class="w-full mt-1 border rounded px-3 py-2" />
                    </label>

                    <label class="text-sm">Tipo
                        <select [(ngModel)]="novoVeiculo.type" class="w-full mt-1 border rounded px-3 py-2">
                            <option value="">Selecione</option>
                            <option *ngFor="let t of carroceriasOptions" [value]="t">{{ t }}</option>
                        </select>
                    </label>

                    <label class="text-sm">Motor
                        <select [(ngModel)]="novoVeiculo.engine" class="w-full mt-1 border rounded px-3 py-2">
                            <option value="">Selecione</option>
                            <option *ngFor="let m of motoresOptions" [value]="m">{{ m }}</option>
                        </select>
                    </label>

                    <label class="text-sm">Quantidade de lugares
                        <select [(ngModel)]="novoVeiculo.size" class="w-full mt-1 border rounded px-3 py-2">
                            <option value="">Selecione</option>
                            <option *ngFor="let s of lugaresOptions" [value]="s">{{ s }}</option>
                        </select>
                    </label>

                    <label class="text-sm">URL da imagem
                        <input [(ngModel)]="novoVeiculo.imageUrl" class="w-full mt-1 border rounded px-3 py-2" />
                    </label>
                </div>

                <div class="mt-4 flex gap-3 justify-end">
                    <button (click)="fecharModalAdicionar()" class="px-4 py-2 rounded bg-gray-100">Cancelar</button>
                    <button (click)="salvarCarroInicio()" class="px-4 py-2 rounded bg-rose-600 text-white">Salvar carro</button>
                </div>

                <div *ngIf="sucessoMensagem" class="mt-3 text-sm text-green-600">{{ sucessoMensagem }}</div>
            </div>
        </div>
    </main>

    <app-menu *ngIf="!mostrandoModalAdicionar"></app-menu>
</section>
