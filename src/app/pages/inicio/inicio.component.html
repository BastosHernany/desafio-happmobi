<section class="bg-[#FDFDFD] min-h-screen pb-35">
    <header class="w-full relative">
        <img src="assets/banner-inicio.png" alt="Banner" class="w-full h-67.5 object-cover" />


        <div class="absolute left-1/2 bottom-0 transform -translate-x-1/2 translate-y-1/2">
            <div class="w-34 h-34 rounded-full overflow-hidden">
                <img src="assets/avatar.jpg" alt="Avatar" class="w-full h-full object-cover object-center block transform scale-105" />
            </div>
        </div>
    </header>


    <main class="px-4 pt-16">
        <div class="flex flex-col items-center">
            <h2 class="mt-6 text-xl font-medium text-slate-800">Olá, Marcos Silva</h2>
        </div>


        <div class="mt-6 flex gap-4 items-center justify-center">
            <button class="flex-1 bg-white shadow rounded-xl py-3 px-4 flex items-center gap-3">
                <img src="assets/icones/lupa.svg" alt="Buscar" class="w-5 h-5" />
                <span class="text-slate-600">Buscar carro</span>
            </button>

            <button class="w-24 bg-white shadow rounded-xl py-3 flex items-center justify-center">
                <img src="assets/icones/filtro.svg" alt="Filtrar" class="w-5 h-5" />
                <span class="text-slate-600">Filtrar</span> 
            </button>
        </div>


        <section class="mt-8">
            <h3 class="text-lg font-semibold text-slate-800 mb-4">Últimas reservas</h3>

            <div class="flex gap-4 overflow-x-auto pb-4 no-scrollbar touch-pan-x cursor-grab" appArrastarScroll>
                <ng-container *ngIf="carros$ | async as carros">
                    <app-card-carro *ngFor="let c of carros.slice(0,2)" [carro]="c"></app-card-carro>
                </ng-container>
            </div>
        </section>


        <div class="mt-8 flex justify-center">
            <button class="bg-slate-800 text-white rounded-full px-8 py-4 shadow-lg flex items-center gap-3">
                <img src="assets/icones/qr-code.svg" alt="QR" class="w-6 h-6" />
                <span>Acessar por QR code</span>
            </button>
        </div>
    </main>

    <app-menu />
</section>
