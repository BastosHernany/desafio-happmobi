<section class="min-h-screen bg-[#0f2a35] flex items-center justify-center relative overflow-hidden px-6">
	<img src="assets/marca-dagua.png" alt="Marca d'água Logo Guardians" aria-hidden="true"
		class="pointer-events-none absolute right-6 top-0 rigth-0 opacity-10 object-contain w-72.25 h-79.75 sm:w-85 sm:h-94" />

	<main class="w-full max-w-sm">
		<header class="flex flex-col items-center text-center mb-6">
			<img src="assets/logo.png" alt="Logo Guardians" class="w-38.25 h-30.25  mb-3" />
		</header>

		<form (ngSubmit)="login()" class="space-y-4" aria-label="Formulário de login">
			<div>
				<label for="email" class="sr-only">Email</label>
				<input id="email" name="email" type="email" placeholder="Email" [(ngModel)]="email"
					class="w-full bg-white rounded-full py-3 px-6 placeholder-gray-400 text-gray-700 shadow-md focus:outline-none focus:ring-2 focus:ring-white/30" />
			</div>

			<div>
				<label for="senha" class="sr-only">Senha</label>
				<input id="senha" name="senha" type="password" placeholder="Senha" [(ngModel)]="senha"
					class="w-full bg-white rounded-full py-3 px-6 placeholder-gray-400 text-gray-700 shadow-md focus:outline-none focus:ring-2 focus:ring-white/30" />
			</div>

			<div>
				<button type="submit"
					class="w-full bg-red-600 hover:bg-red-700 text-white font-semibold py-3 rounded-full shadow-xl uppercase tracking-wider cursor-pointer">ENTRAR</button>
			</div>

			<div class="text-center">
				<a href="#" class="text-sm text-white/80 underline">Esqueci minha senha</a>
			</div>
		</form>

		<div *ngIf="erro" class="mt-4 text-center text-rose-500">{{ erro }}</div>

		<p class="text-center text-sm text-white/70 mt-12">Ainda não tem cadastro? <a routerLink="/criar-conta" class="underline text-white cursor-pointer">Criar conta</a></p>
	</main>
</section>
