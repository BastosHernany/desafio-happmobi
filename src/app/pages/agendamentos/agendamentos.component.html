<section class="bg-[#FDFDFD] min-h-screen pb-35">
	<app-header></app-header>

	<main class="px-4 pt-6">
		<h2 class="text-2xl font-semibold mb-4">Meus agendamentos</h2>

		<div *ngIf="carrosReservados && carrosReservados.length > 0" class="grid grid-cols-1 sm:grid-cols-2 gap-4">
			<div *ngFor="let c of carrosReservados; let i = index" class="bg-white rounded-lg p-4 shadow">
				<app-card-carro [carro]="c" [contexto]="'agendamentos'"></app-card-carro>
                    <div class="mt-3 flex gap-3">
                        <button (click)="solicitarConfirmacao(reservas[i], 'cancelar', i)" class="px-4 py-2 rounded bg-gray-100 cursor-pointer">Cancelar Reserva</button>
					<button (click)="solicitarConfirmacao(reservas[i], 'finalizar', i)" class="px-4 py-2 rounded bg-rose-600 text-white cursor-pointer">Finalizar reserva</button>
				</div>
			</div>
		</div>

		<div *ngIf="!carrosReservados || carrosReservados.length === 0" class="bg-white rounded-lg p-6 text-center shadow">
			<p class="text-slate-700 mb-4">Você não possui agendamentos ativos.</p>
			<div class="flex justify-center">
				<button routerLink="/filtro" class="bg-rose-600 text-white rounded-full px-6 py-3 shadow-lg flex items-center gap-3 cursor-pointer">Reservar agora</button>
			</div>
		</div>

		<div *ngIf="mensagem" class="mt-4 text-green-600">{{ mensagem }}</div>
	</main>

	<!-- Modal de confirmação de cancelar/finalizar -->
	<div *ngIf="confirmModal" class="fixed inset-0 z-50 flex items-center justify-center bg-black/50">
		<div class="bg-white rounded-lg p-6 max-w-sm w-full">
			<h3 class="text-lg font-semibold mb-3">{{ confirmType === 'cancelar' ? 'Cancelar reserva' : 'Finalizar reserva' }}</h3>
			<p class="mb-4">Deseja realmente {{ confirmType === 'cancelar' ? 'cancelar' : 'finalizar' }} sua reserva?</p>
			<div class="flex justify-end gap-3">
				<button (click)="confirmarAcao(false)" class="px-4 py-2 rounded bg-gray-100 cursor-pointer">Não</button>
				<button (click)="confirmarAcao(true)" class="px-4 py-2 rounded bg-rose-600 text-white cursor-pointer">Sim</button>
			</div>
		</div>
	</div>

	<app-menu *ngIf="!confirmModal"></app-menu>
</section>
